.container {

/* LOGO REDONDA COM AURA */
.logo-wrapper {

}

/* BOTÕES BASE */
.btn {
  display: block;
  margin: 14px 0;
  padding: 15px;
  border-radius: 40px;
  text-decoration: none;
  background: rgba(255,255,255,0.9);
  color: #000;
  backdrop-filter: blur(8px);
  transition: 0.3s;
  border: 1px solid #d4af7f;
}

/* HOVER */
.btn:hover {
  transform: scale(1.03);
  box-shadow: 0 8px 25px rgba(0,0,0,0.1);
}

/* BOTÃO PRINCIPAL DOURADO */
.gold {
  background: linear-gradient(135deg, #c8a96a, #e6d3a3);

/* SEÇÕES */

  color: #333;
}

.section h3 {
  margin-bottom: 10px;

  color: #b8965a;

/* RODAPÉ */

  margin-top: 30px;
  font-size: 12px;
