<style>

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: url('fundo.jpg.png') no-repeat center center;
  background-size: cover;
  display: flex;
  justify-content: center;
  color: #111;
}

/* camada clara pra deixar clean */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(255,255,255,0.65);
  backdrop-filter: blur(2px);
}

/* container principal */
.container {
  max-width: 420px;
  width: 100%;
  padding: 50px 20px;
  text-align: center;
  position: relative;
  z-index: 1;
}

/* LOGO GRANDE */
.logo {
  width: 220px;
  margin-bottom: 20px;
}

/* TÍTULO */
h1 {
  letter-spacing: 3px;
  font-weight: 500;
  color: #000;
}

/* FRASE */
.tagline {
  font-size: 14px;
  opacity: 0.6;
  margin-bottom: 35px;
}

/* BOTÕES */
.btn {
  display: block;
  margin: 14px 0;
  padding: 15px;
  border-radius: 40px;
  text-decoration: none;
  color: #000;
  background: rgba(255,255,255,0.85);
  border: 1px solid rgba(0,0,0,0.05);
  backdrop-filter: blur(8px);
  transition: 0.3s;
}

/* efeito hover */
.btn:hover {
  transform: scale(1.03);
  box-shadow: 0 8px 25px rgba(0,0,0,0.1);
}

/* botão dourado principal */
.gold {
  background: linear-gradient(135deg, #c8a96a, #e6d3a3);
  color: #fff;
  font-weight: 500;
  border: none;
}

.gold:hover {
  filter: brightness(1.05);
}

/* SEÇÕES */
.section {
  margin-top: 40px;
  text-align: left;
  font-size: 14px;
  color: #333;
}

.section h3 {
  margin-bottom: 10px;
  font-weight: 500;
  color: #b8965a;
}

/* RODAPÉ */
.footer {
  margin-top: 30px;
  font-size: 12px;
  opacity: 0.5;
}

</style>
</head>
